<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: #6366f1;
    filter: blur(180px);
    opacity: 0.4;
    animation: move 10s infinite alternate;
}

@keyframes move {
    from { transform: translate(-100px, -100px); }
    to { transform: translate(100px, 100px); }
}

.container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 50px;
    border-radius: 24px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-width: 600px;
}

h1 {
    font-size: 2.8rem;
    font-weight: 600;
    margin-bottom: 15px;
}

p {
    font-size: 1.1rem;
    color: #cbd5f5;
    margin-bottom: 30px;
}

.loader {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.1);
    border-top: 3px solid #6366f1;
    margin: 0 auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.badge {
    margin-top: 25px;
    display: inline-block;
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(99,102,241,0.15);
    color: #a5b4fc;
    font-size: 0.85rem;
}

.admin {
    margin-top: 15px;
    font-size: 0.9rem;
    color: #94a3b8;
}

.footer {
    margin-top: 30px;
    font-size: 0.85rem;
    color: #64748b;
}
</style>

</head>
<body>

<div class="container">
    <h1>🚧 System Under Maintenance</h1>
    <p>We're upgrading our platform to serve you better.<br>
    Please come back shortly.</p>

    <div class="loader"></div>

    <div class="badge">Status: In Progress</div>

    <div class="admin">
        System Administrator: <strong>ALEX TOLENTINO</strong>
    </div>

    <div class="footer">
        © 2026 Your Company • All rights reserved
    </div>
</div>

</body>
</html>
